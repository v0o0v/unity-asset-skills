# asset templates — 빌더 입력
#
# 각 항목은 {kind, name, dir, ext, labels(optional), tags_hint, summary_hint, golden_id(optional)}.
# - kind: Unity 에셋 타입 (Prefab, Material, Texture, MonoScript, AnimatorController, ScriptableObject, Scene)
# - name: 파일 stem
# - dir: 패키지/카테고리 디렉터리 (Assets/ 하위)
# - ext: 확장자 (.prefab, .mat, ...) — kind에서 추론 가능하지만 명시
# - labels: Unity AssetLabels (.meta의 labels 필드)
# - tags_hint: asset-tagger가 생성할 것으로 기대되는 llm_tags 힌트 (실제 인덱싱 시 LLM이 변형 가능)
# - summary_hint: llm_summary 힌트 (영어). 인덱서 LLM 출력 언어 영어 정책에 맞춤.
# - golden_id: 정의되면 golden-queries.yml에서 expected answer로 참조. decoy 규칙은 빌더가 검증.
#
# decoy-overlapping 규칙 (CRIT-SCH1):
# - golden_id 부여된 항목의 tags_hint에서 임의의 한 tag가 다른 decoy 항목(같은 도메인)의 tags_hint와 겹쳐야 함.
# - 빌더가 이 invariant를 build 시 검증.

templates:
  # === MedievalVillage 패키지 ===
  - {kind: Prefab,         name: Wall_01,           dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval, wall],     tags_hint: [medieval, village, exterior, stone-wall, modular],          summary_hint: "Medieval European village exterior wall, modular stone wall prefab.",       golden_id: medieval_wall_modular}
  - {kind: Prefab,         name: Wall_02_Decorated, dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval, wall],     tags_hint: [medieval, village, exterior, stone-wall, ornament],         summary_hint: "Medieval exterior wall prefab with ornamental patterns."}
  - {kind: Prefab,         name: House_Small,       dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval],           tags_hint: [medieval, village, house, residential, modular],            summary_hint: "Small medieval farmhouse prefab, modular."}
  - {kind: Prefab,         name: Tavern,            dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval],           tags_hint: [medieval, village, tavern, building, weathered],            summary_hint: "Weathered medieval tavern prefab.",                                           golden_id: medieval_tavern}
  - {kind: Material,       name: Stone_Mossy,       dir: Assets/Packages/MedievalVillage/Materials, ext: .mat,       labels: [],                   tags_hint: [medieval, stone, mossy, weathered, material],               summary_hint: "Mossy stone material with weathered atmosphere.",                             golden_id: mossy_stone_material}
  - {kind: Material,       name: Wood_Worn,         dir: Assets/Packages/MedievalVillage/Materials, ext: .mat,       labels: [],                   tags_hint: [medieval, wood, worn, weathered, material],                 summary_hint: "Worn wooden material with weathered atmosphere."}
  - {kind: Texture,        name: Stone_Albedo,      dir: Assets/Packages/MedievalVillage/Textures, ext: .png,       labels: [],                   tags_hint: [medieval, stone, albedo, texture],                          summary_hint: "Stone albedo texture."}

