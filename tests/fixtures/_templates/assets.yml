  - {kind: MonoScript,     name: SpawnManager,      dir: Assets/Scripts/Gameplay,                  ext: .cs,         labels: [],                   tags_hint: [gameplay, spawn, manager, zombie, wave],                    summary_hint: "좀비 스폰 매니저 스크립트."}

  # === Scenes ===
  - {kind: Scene,          name: MainMenu_Scene,    dir: Assets/Scenes,                            ext: .unity,      labels: [],                   tags_hint: [scene, main-menu, ui],                                      summary_hint: "메인 메뉴 씬."}
  - {kind: Scene,          name: Gameplay_Scene,    dir: Assets/Scenes,                            ext: .unity,      labels: [],                   tags_hint: [scene, gameplay, top-down, survival],                       summary_hint: "탑다운 생존 게임플레이 씬."}
