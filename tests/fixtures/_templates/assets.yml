  - {kind: Prefab,         name: Tree_Oak,          dir: Assets/Packages/NatureForest/Prefabs,     ext: .prefab,     labels: [nature, tree],       tags_hint: [nature, forest, tree, oak, vegetation],                     summary_hint: "Oak tree prefab for natural environments.",                                   golden_id: tree_oak_vegetation}
