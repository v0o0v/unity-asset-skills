  # q31 (scriptable_object): LootTableConfig — 루트 테이블 ScriptableObject
  - {kind: ScriptableObject, name: LootTableConfig,  dir: Assets/Packages/ZombieKit/Configs,       ext: .asset,      labels: [],                   tags_hint: [loot, drop, table, config, reward, scriptable-object],      summary_hint: "Enemy kill drop item loot table ScriptableObject.",                           golden_id: loot_table_config}
