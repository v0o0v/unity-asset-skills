# asset templates — 빌더 입력
#
# 각 항목은 {kind, name, dir, ext, labels(optional), tags_hint, summary_hint, golden_id(optional)}.
# - kind: Unity 에셋 타입 (Prefab, Material, Texture, MonoScript, AnimatorController, ScriptableObject, Scene)
# - name: 파일 stem
# - dir: 패키지/카테고리 디렉터리 (Assets/ 하위)
# - ext: 확장자 (.prefab, .mat, ...) — kind에서 추론 가능하지만 명시
# - labels: Unity AssetLabels (.meta의 labels 필드)
# - tags_hint: asset-tagger가 생성할 것으로 기대되는 llm_tags 힌트 (실제 인덱싱 시 LLM이 변형 가능)
# - summary_hint: llm_summary 힌트 (한글)
# - golden_id: 정의되면 golden-queries.yml에서 expected answer로 참조. decoy 규칙은 빌더가 검증.
#
# decoy-overlapping 규칙 (CRIT-SCH1):
# - golden_id 부여된 항목의 tags_hint에서 임의의 한 tag가 다른 decoy 항목(같은 도메인)의 tags_hint와 겹쳐야 함.
# - 빌더가 이 invariant를 build 시 검증.

templates:
  # === MedievalVillage 패키지 ===
  - {kind: Prefab,         name: Wall_01,           dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval, wall],     tags_hint: [medieval, village, exterior, stone-wall, modular],          summary_hint: "중세 유럽 마을 외벽, 모듈형 석조 벽 프리팹.",                   golden_id: medieval_wall_modular}
  - {kind: Prefab,         name: Wall_02_Decorated, dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval, wall],     tags_hint: [medieval, village, exterior, stone-wall, ornament],         summary_hint: "장식 무늬가 들어간 중세 외벽 프리팹."}
  - {kind: Prefab,         name: House_Small,       dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval],           tags_hint: [medieval, village, house, residential, modular],            summary_hint: "작은 중세 농가 프리팹, 모듈형."}
  - {kind: Prefab,         name: Tavern,            dir: Assets/Packages/MedievalVillage/Prefabs,  ext: .prefab,     labels: [medieval],           tags_hint: [medieval, village, tavern, building, weathered],            summary_hint: "황폐한 분위기의 중세 선술집 프리팹."}
  - {kind: Material,       name: Stone_Mossy,       dir: Assets/Packages/MedievalVillage/Materials, ext: .mat,       labels: [],                   tags_hint: [medieval, stone, mossy, weathered, material],               summary_hint: "이끼 낀 석재 머티리얼, 황폐한 분위기."}
  - {kind: Material,       name: Wood_Worn,         dir: Assets/Packages/MedievalVillage/Materials, ext: .mat,       labels: [],                   tags_hint: [medieval, wood, worn, weathered, material],                 summary_hint: "닳은 목재 머티리얼, 황폐한 분위기."}
  - {kind: Texture,        name: Stone_Albedo,      dir: Assets/Packages/MedievalVillage/Textures, ext: .png,       labels: [],                   tags_hint: [medieval, stone, albedo, texture],                          summary_hint: "석재 albedo 텍스처."}

  # === SciFi Buildings 패키지 — decoy for medieval (둘 다 'exterior' / 'modular' 겹침) ===
  - {kind: Prefab,         name: SciFi_Wall_01,     dir: Assets/Packages/SciFiBuildings/Prefabs,   ext: .prefab,     labels: [scifi, wall],        tags_hint: [scifi, futuristic, exterior, panel-wall, modular],          summary_hint: "미래주의 SF 외벽 프리팹, 모듈형 패널."}
  - {kind: Prefab,         name: SciFi_Crate,       dir: Assets/Packages/SciFiBuildings/Prefabs,   ext: .prefab,     labels: [scifi],              tags_hint: [scifi, futuristic, crate, prop, modular],                   summary_hint: "SF 보급 상자 프리팹."}
  - {kind: Material,       name: Metal_Brushed,     dir: Assets/Packages/SciFiBuildings/Materials, ext: .mat,       labels: [],                   tags_hint: [scifi, metal, brushed, material],                           summary_hint: "브러시드 메탈 머티리얼, SF 분위기."}

  # === ZombieKit 패키지 — CRIT-EE1 핵심 ===
  - {kind: Prefab,         name: Zombie_Basic,      dir: Assets/Packages/ZombieKit/Prefabs,         ext: .prefab,     labels: [zombie, enemy],      tags_hint: [zombie, enemy, character, humanoid, survival],              summary_hint: "기본 좀비 적 프리팹, 휴머노이드.",                          golden_id: zombie_basic_enemy}
  - {kind: Prefab,         name: Zombie_Fast,       dir: Assets/Packages/ZombieKit/Prefabs,         ext: .prefab,     labels: [zombie, enemy],      tags_hint: [zombie, enemy, character, humanoid, survival, fast],        summary_hint: "빠르게 추격하는 좀비 적 프리팹."}
  - {kind: Prefab,         name: Survivor_Player,   dir: Assets/Packages/ZombieKit/Prefabs,         ext: .prefab,     labels: [player, survival],   tags_hint: [survivor, player, character, humanoid, survival, top-down], summary_hint: "탑다운 시점 생존자 플레이어 프리팹.",                       golden_id: survivor_player_topdown}
  - {kind: AnimatorController, name: Zombie_AC,      dir: Assets/Packages/ZombieKit/Animators,      ext: .controller, labels: [zombie],             tags_hint: [zombie, enemy, animation, locomotion],                      summary_hint: "좀비 적 애니메이션 컨트롤러."}
  - {kind: AnimatorController, name: Survivor_AC,    dir: Assets/Packages/ZombieKit/Animators,      ext: .controller, labels: [player],             tags_hint: [survivor, player, animation, locomotion, top-down],         summary_hint: "탑다운 생존자 애니메이션 컨트롤러."}
  - {kind: MonoScript,     name: ZombieAI,          dir: Assets/Packages/ZombieKit/Scripts,         ext: .cs,         labels: [],                   tags_hint: [zombie, enemy, ai, behavior, survival],                     summary_hint: "좀비 추격 AI 스크립트."}
  - {kind: MonoScript,     name: PlayerController,  dir: Assets/Packages/ZombieKit/Scripts,         ext: .cs,         labels: [],                   tags_hint: [survivor, player, controller, top-down, input],             summary_hint: "탑다운 생존자 입력·이동 컨트롤러."}
  - {kind: ScriptableObject, name: WaveConfig,       dir: Assets/Packages/ZombieKit/Configs,        ext: .asset,      labels: [],                   tags_hint: [zombie, wave, spawn, config, survival],                     summary_hint: "좀비 wave 스폰 설정 ScriptableObject.",                     golden_id: wave_config_so}

  # === FPSKit 패키지 — decoy for player (둘 다 'character', 'controller' 겹침) ===
  - {kind: Prefab,         name: FPS_Player,        dir: Assets/Packages/FPSKit/Prefabs,           ext: .prefab,     labels: [player, fps],        tags_hint: [fps, player, character, humanoid, first-person],            summary_hint: "1인칭 시점 플레이어 프리팹."}
  - {kind: MonoScript,     name: FPSController,     dir: Assets/Packages/FPSKit/Scripts,           ext: .cs,         labels: [],                   tags_hint: [fps, player, controller, first-person, input],              summary_hint: "1인칭 시점 플레이어 컨트롤러."}

  # === NatureForest 패키지 ===
  - {kind: Prefab,         name: Tree_Pine,         dir: Assets/Packages/NatureForest/Prefabs,     ext: .prefab,     labels: [nature, tree],       tags_hint: [nature, forest, tree, pine, vegetation],                    summary_hint: "소나무 프리팹, 자연 환경.",                                 golden_id: tree_pine_vegetation}
  - {kind: Prefab,         name: Tree_Oak,          dir: Assets/Packages/NatureForest/Prefabs,     ext: .prefab,     labels: [nature, tree],       tags_hint: [nature, forest, tree, oak, vegetation],                     summary_hint: "참나무 프리팹, 자연 환경."}
  - {kind: Prefab,         name: Rock_Mossy,        dir: Assets/Packages/NatureForest/Prefabs,     ext: .prefab,     labels: [nature, rock],       tags_hint: [nature, rock, mossy, prop, vegetation],                     summary_hint: "이끼 낀 바위 프리팹."}
  - {kind: Texture,        name: Bark_Albedo,       dir: Assets/Packages/NatureForest/Textures,    ext: .png,       labels: [],                   tags_hint: [nature, tree, bark, albedo, texture],                       summary_hint: "나무 껍질 albedo 텍스처."}

  # === UIKit 패키지 ===
  - {kind: Prefab,         name: MainMenu,          dir: Assets/Packages/UIKit/Prefabs,            ext: .prefab,     labels: [ui],                 tags_hint: [ui, menu, main-menu, canvas, screen],                       summary_hint: "메인 메뉴 UI 프리팹.",                                       golden_id: main_menu_ui}
  - {kind: Prefab,         name: HUD,               dir: Assets/Packages/UIKit/Prefabs,            ext: .prefab,     labels: [ui],                 tags_hint: [ui, hud, overlay, canvas, gameplay],                        summary_hint: "게임플레이 HUD 오버레이 프리팹."}
  - {kind: Prefab,         name: PauseMenu,         dir: Assets/Packages/UIKit/Prefabs,            ext: .prefab,     labels: [ui],                 tags_hint: [ui, menu, pause-menu, canvas, screen],                      summary_hint: "일시정지 메뉴 UI 프리팹."}
  - {kind: MonoScript,     name: MenuController,    dir: Assets/Packages/UIKit/Scripts,            ext: .cs,         labels: [],                   tags_hint: [ui, menu, controller, navigation],                          summary_hint: "메뉴 화면 전환 컨트롤러."}

  # === AudioKit 패키지 ===
  - {kind: Texture,        name: SFX_Footstep,      dir: Assets/Packages/AudioKit/SFX,             ext: .wav,        labels: [audio],              tags_hint: [audio, sfx, footstep, character],                           summary_hint: "발자국 효과음."}
  - {kind: Texture,        name: Music_Tension,     dir: Assets/Packages/AudioKit/Music,           ext: .wav,        labels: [audio, music],       tags_hint: [audio, music, tension, survival, atmosphere],               summary_hint: "긴장감 있는 배경 음악, 생존 게임용.",                       golden_id: music_tension_survival}
