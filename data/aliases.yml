  스폰: [spawn, spawner, instantiate]
  설정: [config, configuration, settings, scriptable-object]
  나무: [tree, pine, oak, vegetation]
  식생: [vegetation, foliage, plant]
  메인: [main, primary]
  UI: [ui, hud, interface, canvas]
  긴장감: [tension, suspense, dark]
  게임: [game, gameplay]
  배경: [background, ambient, backdrop]
  이끼: [moss, mossy, lichen]
