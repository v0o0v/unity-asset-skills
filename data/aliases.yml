# aliases.yml — 한↔영 별칭 사전 (CRIT-SCH5)
#
# Search 1차 라우팅 prompt에 첨부되는 한↔영 alias hint의 진실원.
# 한글 token이 사용자 raw 쿼리에서 추출되면 lookup → routing prompt에
# `--- Aliases hint ---` 블록으로 첨부된다.
#
# 형식: aliases: { <korean_word>: [<english_alias_1>, <english_alias_2>, ...] }
# - korean_word는 사용자 쿼리에서 발견될 수 있는 한글 token (단어 단위).
# - english_alias 배열은 routing subagent에게 힌트로 전달되어 sub_intents[].category_hint
#   또는 subtype_hint 결정에 영향을 준다.
#
# 우선순위:
# 1. 골든 쿼리 (tests/golden-queries.yml) 한글 키워드 100% 커버.
# 2. Wave 1 도메인 (medieval/survival/zombie/top-down) 확장.
# 3. 글로벌 공통 alias 30개 이상.

version: 1
aliases:
  # === 골든 쿼리 핵심 키워드 (sch1_recall q01~q10 + orc1_routing) ===
  좀비: [zombie, undead, ghoul, enemy]
  검: [sword, blade, weapon]
  숲: [forest, woods, vegetation]
  메뉴: [menu, ui, hud]
  음악: [music, audio, bgm]
  효과음: [sfx, sound-effect, audio]
  캐릭터: [character, humanoid, actor]
  환경: [environment, scenery, ambience]
  석재: [stone, masonry, rock]
  중세: [medieval, fantasy, historical]

  # === 골든 쿼리 추가 키워드 (q01~q10, r01~r10) ===
  외벽: [exterior-wall, wall, facade, modular-wall]
  마을: [village, town, settlement]
  적: [enemy, hostile, foe]
